name: Playwright API Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_backend
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet build src/ReportesAPI/ReportesAPI.csproj -c Release
      - run: dotnet run --project src/ReportesAPI/ReportesAPI.csproj -c Release --urls "http://0.0.0.0:5000" &
      - run: npx wait-on http://localhost:5000/health --timeout 30000
      - name: Setup Playwright
        working-directory: tests/e2e
        run: |
          corepack enable
          pnpm install
          npx playwright install --with-deps chromium
      - name: Run tests
        working-directory: tests/e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30
